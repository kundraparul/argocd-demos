apiVersion: argoproj.io/v1alpha1
kind: Rollout

metadata:
  name: nginx-rollout

spec:
  replicas: 4

  strategy:
    canary:
      steps:
      - setWeight: 25
      - pause:
          duration: 20

      - setWeight: 50
      - pause:
          duration: 20

      - setWeight: 100

  selector:
    matchLabels:
      app: nginx-rollout

  template:
    metadata:
      labels:
        app: nginx-rollout

    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80


