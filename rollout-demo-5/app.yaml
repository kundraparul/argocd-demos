apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: rollout-demo-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: 'https://github.com/kundraparul/argocd-demos.git'
    targetRevision: HEAD
    path: rollout-demo-5

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

